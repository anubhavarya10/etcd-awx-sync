name: Playbook Validation

# Trigger on PRs and pushes that modify playbooks
on:
  pull_request:
    paths:
      - 'playbooks/**/*.yml'
      - 'playbooks/**/*.yaml'
      - 'ansible/**/*.yml'
      - 'ansible/**/*.yaml'
  push:
    paths:
      - 'playbooks/**/*.yml'
      - 'playbooks/**/*.yaml'
      - 'ansible/**/*.yml'
      - 'ansible/**/*.yaml'
    branches:
      - main
      - develop

jobs:
  validate-playbooks:
    name: Validate Playbooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comparing changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Get changed playbook files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, compare against base branch
            CHANGED=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -E '\.(yml|yaml)$' | grep -E '^(playbooks|ansible)/' || true)
          else
            # For pushes, compare against previous commit
            CHANGED=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.before }} ${{ github.sha }} | grep -E '\.(yml|yaml)$' | grep -E '^(playbooks|ansible)/' || true)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No playbook files changed"
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "Changed playbook files:"
            echo "$CHANGED"
            # Convert to space-separated for the validator
            FILES=$(echo "$CHANGED" | tr '\n' ' ')
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Validate playbooks
        if: steps.changed-files.outputs.files != ''
        run: |
          echo "Validating playbooks..."
          python scripts/playbook_validator.py ${{ steps.changed-files.outputs.files }}

      - name: Ansible Syntax Check
        if: steps.changed-files.outputs.files != ''
        run: |
          pip install ansible-core
          echo "Running ansible syntax check..."
          for file in ${{ steps.changed-files.outputs.files }}; do
            echo "Checking: $file"
            ansible-playbook --syntax-check "$file" || exit 1
          done

      - name: Post validation summary
        if: always() && steps.changed-files.outputs.files != ''
        run: |
          echo "## Playbook Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $? -eq 0 ]; then
            echo "All playbook validations passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Some validations failed. Please review the errors above." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Standards Reference" >> $GITHUB_STEP_SUMMARY
            echo "See [PLAYBOOK_STANDARDS.md](docs/PLAYBOOK_STANDARDS.md) for guidelines." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Skip message
        if: steps.changed-files.outputs.files == ''
        run: |
          echo "No playbook files were changed in this PR/push. Skipping validation."
          echo "## Playbook Validation" >> $GITHUB_STEP_SUMMARY
          echo "No playbook files changed - validation skipped." >> $GITHUB_STEP_SUMMARY

  lint-yaml:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Create yamllint config
        run: |
          cat > .yamllint.yml << 'EOF'
          extends: default
          rules:
            line-length:
              max: 200
              allow-non-breakable-words: true
            truthy:
              allowed-values: ['true', 'false', 'yes', 'no']
            comments:
              min-spaces-from-content: 1
            indentation:
              spaces: 2
              indent-sequences: consistent
          ignore: |
            .github/
            venv/
            .venv/
          EOF

      - name: Run yamllint on changed files
        run: |
          # Get changed YAML files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }} HEAD | grep -E '\.(yml|yaml)$' | grep -E '^(playbooks|ansible)/' || true)
          else
            CHANGED=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD | grep -E '\.(yml|yaml)$' | grep -E '^(playbooks|ansible)/' || true)
          fi

          if [ -n "$CHANGED" ]; then
            echo "Linting files:"
            echo "$CHANGED"
            echo "$CHANGED" | xargs yamllint -c .yamllint.yml
          else
            echo "No YAML files to lint"
          fi

  comment-on-failure:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [validate-playbooks, lint-yaml]
    if: failure() && github.event_name == 'pull_request'

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Playbook Validation Failed

            Your playbook changes did not pass validation. Please review the errors in the workflow logs and fix them before merging.

            ### Common Issues:
            - **hosts directive**: Use plain role name (e.g., \`tps\`) not prefixed (\`role-tps\`)
            - **delegate_to + become**: Don't use \`delegate_to: localhost\` with \`become: yes\`
            - **Collections**: Use modules from available collections only

            ### Reference:
            See [PLAYBOOK_STANDARDS.md](docs/PLAYBOOK_STANDARDS.md) for complete guidelines.

            ---
            *This comment was automatically generated by the playbook validation workflow.*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
