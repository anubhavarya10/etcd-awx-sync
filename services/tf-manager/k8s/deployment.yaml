apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf-manager
  labels:
    app: tf-manager
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: tf-manager
  template:
    metadata:
      labels:
        app: tf-manager
    spec:
      imagePullSecrets:
        - name: gcr-secret
      containers:
        - name: tf-manager
          image: us-east1-docker.pkg.dev/unity-vivox-docker-registry/mcp-vivox-ops/tf-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              name: http
          envFrom:
            - configMapRef:
                name: tf-manager-config
            - secretRef:
                name: tf-manager-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: tf-manager
  labels:
    app: tf-manager
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: http
      name: http
  selector:
    app: tf-manager
