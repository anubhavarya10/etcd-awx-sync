apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-manager
  labels:
    app: service-manager
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: service-manager
  template:
    metadata:
      labels:
        app: service-manager
    spec:
      imagePullSecrets:
        - name: gcr-secret
      containers:
        - name: service-manager
          image: us-east1-docker.pkg.dev/unity-vivox-docker-registry/mcp-vivox-ops/service-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: service-manager-config
            - secretRef:
                name: service-manager-secrets
          volumeMounts:
            - name: ssh-key
              mountPath: /app/ssh
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: ssh-key
          secret:
            secretName: service-manager-ssh
            defaultMode: 0600
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: service-manager
  labels:
    app: service-manager
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      name: http
  selector:
    app: service-manager
